<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On3 College Football TV Ratings Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #E91518;
    --secondary: #FFFFFF;
    --bg: #0E0E10;
    --surface: #19191C;
    --surface-2: #212124;
    --border: #2E2E32;
    --text: #F4F4F5;
    --text-dim: #A2A2A8;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
  }
  [data-theme="light"] {
    --bg: #F5F5F6;
    --surface: #FFFFFF;
    --surface-2: #F0F0F1;
    --border: #E1E1E3;
    --text: #17171A;
    --text-dim: #6B6B72;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    transition: background 0.2s ease, color 0.2s ease;
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  header.page-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 22px;
    border-bottom: 3px solid var(--primary);
    padding-bottom: 16px;
  }

  .title-block .eyebrow {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--primary);
    margin: 0 0 4px;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(28px, 5vw, 42px);
    line-height: 1.02;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .theme-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 999px;
    padding: 8px 14px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .theme-toggle:hover { border-color: var(--primary); }
  .theme-toggle:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, th[data-sort]:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 18px;
  }

  .search-box {
    flex: 1 1 220px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px 10px 34px;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 14px;
  }
  .search-box::before {
    content: "";
    position: absolute;
    left: 12px;
    top: 50%;
    width: 12px;
    height: 12px;
    transform: translateY(-50%);
    border: 2px solid var(--text-dim);
    border-radius: 50%;
    pointer-events: none;
  }
  .search-box::after {
    content: "";
    position: absolute;
    left: 21px;
    top: 60%;
    width: 6px;
    height: 2px;
    background: var(--text-dim);
    transform: rotate(45deg);
    pointer-events: none;
  }

  select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 14px;
    cursor: pointer;
  }

  .meta-row {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* ---- Table (desktop) ---- */
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  thead th {
    text-align: left;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 12px 14px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--primary); }
  thead th .arrow { margin-left: 4px; opacity: 0.5; font-size: 10px; }
  thead th.active .arrow { opacity: 1; color: var(--primary); }

  tbody td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface-2); }

  td.col-viewers { font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--primary); white-space: nowrap; }
  td.col-game { font-weight: 600; }
  td.col-phase, th.col-phase {
    overflow-wrap: normal;
    word-break: normal;
    white-space: nowrap;
  }

  .net-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.03em;
    border: 1px solid var(--nc, var(--border));
    color: var(--nc, var(--text));
    background: color-mix(in srgb, var(--nc, var(--text-dim)) 12%, transparent);
    white-space: nowrap;
    margin: 2px 4px 2px 0;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 14px;
    display: none;
  }

  footer.page-foot {
    margin-top: 22px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }

  /* ---- Mobile cards ---- */
  .card-list { display: none; }

  @media (max-width: 720px) {
    table { display: none; }
    .card-list { display: block; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 14px 12px;
      margin-bottom: 10px;
      width: 100%;
      max-width: 100%;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .card-game {
      font-weight: 600;
      font-size: 14.5px;
      line-height: 1.3;
    }
    .card-viewers {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 20px;
      color: var(--primary);
      white-space: nowrap;
      flex-shrink: 0;
      text-align: right;
    }
    .card-viewers small {
      display: block;
      font-family: var(--font-body);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .card-bottom {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 10px;
      font-size: 12px;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      padding-top: 9px;
    }
    .card-bottom .dot { opacity: 0.5; }
    .card-bottom .card-phase {
      overflow-wrap: normal;
      word-break: normal;
      white-space: nowrap;
    }
  }
</style>
</head>

const WEEK_ORDER = ["Week 1", "Week 2", "Week 3", "Week 4", "Week 5", "Week 6", "Week 7", "Week 8", "Week 9", "Week 10", "Week 11", "Week 12", "Week 13", "Week 14", "Conference Championships", "Army-Navy", "Bowl Games", "College Football Playoff"];

const NETWORK_COLORS = {
  "ABC": "#5E9CFF", "ESPN": "#E91518", "ESPN2": "#FF7A59", "ESPNU": "#FFB84D",
  "FOX": "#3B6EF6", "FS1": "#1A4FD1", "NBC": "#B15CFF", "CBS": "#4DA6FF",
  "BTN": "#8A8AFF", "TNT": "#FFC94D", "The CW": "#3FD1A6",
  "TBS": "#FF8FA3", "truTV": "#5FD68A"
};

let sortState = { key: "viewers", dir: "desc" };
let filters = { search: "", week: "all", network: "all", phase: "all" };

function populateFilterOptions() {
  const weekSel = document.getElementById('weekFilter');
  const netSel = document.getElementById('networkFilter');
  const phaseSel = document.getElementById('phaseFilter');

  const weeksPresent = new Set(DATA.map(d => d.week));
  WEEK_ORDER.filter(w => weeksPresent.has(w)).forEach(w => {
    const opt = document.createElement('option');
    opt.value = w; opt.textContent = w;
    weekSel.appendChild(opt);
  });

  [...new Set(DATA.map(d => d.network))].sort().forEach(n => {
    const opt = document.createElement('option');
    opt.value = n; opt.textContent = n;
    netSel.appendChild(opt);
  });

  [...new Set(DATA.map(d => d.phase))].sort().forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    phaseSel.appendChild(opt);
  });
}

function getFiltered() {
  return DATA.filter(d => {
    const matchesSearch = d.game.toLowerCase().includes(filters.search.toLowerCase());
    const matchesWeek = filters.week === 'all' || d.week === filters.week;
    const matchesNetwork = filters.network === 'all' || d.network === filters.network;
    const matchesPhase = filters.phase === 'all' || d.phase === filters.phase;
    return matchesSearch && matchesWeek && matchesNetwork && matchesPhase;
  });
}

function getSorted(rows) {
  const { key, dir } = sortState;
  return [...rows].sort((a, b) => {
    let av = a[key], bv = b[key];
    if (typeof av === 'string') { av = av.toLowerCase(); bv = bv.toLowerCase(); }
    if (av < bv) return dir === 'asc' ? -1 : 1;
    if (av > bv) return dir === 'asc' ? 1 : -1;
    return 0;
  });
}

function netBadge(network) {
  return network.split('/').map(n => {
    const color = NETWORK_COLORS[n] || '#A2A2A8';
    return `<span class="net-badge" style="--nc:${color}">${n}</span>`;
  }).join(' ');
}

function render() {
  const rows = getSorted(getFiltered());
  const tbody = document.getElementById('tableBody');
  const cardList = document.getElementById('cardList');
  const emptyState = document.getElementById('emptyState');
  const resultCount = document.getElementById('resultCount');

  resultCount.textContent = `${rows.length} of ${DATA.length} games`;
  emptyState.style.display = rows.length ? 'none' : 'block';

  tbody.innerHTML = rows.map(d => `
    <tr>
      <td class="col-viewers">${d.viewers}</td>
      <td class="col-game">${d.game}</td>
      <td>${d.datetime}</td>
      <td>${netBadge(d.network)}</td>
      <td>${d.week}</td>
    </tr>
  `).join('');

  cardList.innerHTML = rows.map(d => `
    <div class="card">
      <div class="card-top">
        <div class="card-game">${d.game}</div>
        <div class="card-viewers"><small>Viewers</small>${d.viewers}M</div>
      </div>
      <div class="card-bottom">
        <span>${d.datetime}</span>
        <span class="dot">&bull;</span>
        <span>${d.week}</span>
        <span class="dot">&bull;</span>
        <span>${netBadge(d.network)}</span>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.classList.toggle('active', th.dataset.sort === sortState.key);
    const arrow = th.querySelector('.arrow');
    if (th.dataset.sort === sortState.key) {
      arrow.innerHTML = sortState.dir === 'asc' ? '&#9650;' : '&#9660;';
    } else {
      arrow.innerHTML = '&#9660;';
    }
  });
}

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.tabIndex = 0;
  const handler = () => {
    const key = th.dataset.sort;
    if (sortState.key === key) {
      sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
    } else {
      sortState = { key, dir: th.dataset.type === 'num' ? 'desc' : 'asc' };
    }
    render();
  };
  th.addEventListener('click', handler);
  th.addEventListener('keypress', e => { if (e.key === 'Enter') handler(); });
});

document.getElementById('searchInput').addEventListener('input', e => {
  filters.search = e.target.value;
  render();
});
document.getElementById('weekFilter').addEventListener('change', e => {
  filters.week = e.target.value;
  render();
});
document.getElementById('networkFilter').addEventListener('change', e => {
  filters.network = e.target.value;
  render();
});
document.getElementById('phaseFilter').addEventListener('change', e => {
  filters.phase = e.target.value;
  render();
});

const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const themeLabel = document.getElementById('themeLabel');
themeToggle.addEventListener('click', () => {
  const body = document.body;
  const isDark = body.getAttribute('data-theme') === 'dark';
  body.setAttribute('data-theme', isDark ? 'light' : 'dark');
  themeToggle.setAttribute('aria-pressed', String(!isDark));
  themeIcon.innerHTML = isDark ? '&#9728;' : '&#9789;';
  themeLabel.textContent = isDark ? 'Light' : 'Dark';
});

populateFilterOptions();
render();
</script>
