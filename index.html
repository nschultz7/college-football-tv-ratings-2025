<style>
  #cfbrt-widget{
    --bg: #FFFFFF;
    --surface: #F7F7F8;
    --surface-2: #EFEFF0;
    --line: #E2E2E4;
    --turf: #B10F12;
    --turf-bright: #1A1C1F;
    --chalk: #17181B;
    --chalk-dim: #6B6E73;
    --gold: #E91518;
    --crimson: #E91518;
    --hero-tint: rgba(233,21,24,0.06);
    --grid-tint: rgba(0,0,0,0.035);
    --card-shadow: rgba(0,0,0,.25);
    --row-hover: rgba(233,21,24,0.05);
    color-scheme: light;
  }
  #cfbrt-widget[data-theme="dark"]{
    --bg: #121316;
    --surface: #1B1D21;
    --surface-2: #24262B;
    --line: #34363B;
    --turf: #E91518;
    --turf-bright: #F2F2F3;
    --chalk: #F2F1EE;
    --chalk-dim: #9A9DA3;
    --gold: #E91518;
    --crimson: #E91518;
    --hero-tint: rgba(233,21,24,0.14);
    --grid-tint: rgba(255,255,255,0.05);
    --card-shadow: rgba(0,0,0,.6);
    --row-hover: rgba(233,21,24,0.14);
    color-scheme: dark;
  }
  #cfbrt-widget{transition:background-color .15s ease, color .15s ease;}
  #cfbrt-widget, #cfbrt-widget *{box-sizing:border-box;}
  #cfbrt-widget{
    display:block;
    max-width:100%;
    overflow-x:hidden;
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
    background:
      radial-gradient(ellipse at top left, var(--hero-tint), transparent 55%),
      var(--bg);
    color:var(--chalk);
    font-family:'Inter',sans-serif;
    padding:0 0 64px 0;
  }
  #cfbrt-widget .wrap{max-width:1180px;margin:0 auto;padding:0 24px;}
  #cfbrt-widget .theme-switch{
    background:none;
    border:none;
    padding:0;
    cursor:pointer;
    line-height:0;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  #cfbrt-widget .theme-switch-track{
    display:inline-block;
    width:46px;
    height:26px;
    border-radius:999px;
    background:var(--surface);
    border:1px solid var(--line);
    position:relative;
    transition:background-color .15s ease, border-color .15s ease;
  }
  #cfbrt-widget .theme-switch:hover .theme-switch-track{border-color:var(--gold);}
  #cfbrt-widget .theme-switch-thumb{
    position:absolute;
    top:2px;
    left:2px;
    width:20px;
    height:20px;
    border-radius:50%;
    background:var(--gold);
    color:#FFFFFF;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    transition:left .15s ease;
  }
  #cfbrt-widget[data-theme="dark"] .theme-switch-thumb{left:22px;}
  #cfbrt-widget section{margin-top:44px;}
  #cfbrt-widget .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
  #cfbrt-widget .section-head h2{
    font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;
    font-size:20px;letter-spacing:.02em;color:var(--chalk);margin:0;
    display:flex;align-items:center;gap:10px;
  }
  #cfbrt-widget .section-head h2::before{content:"";width:4px;height:20px;background:var(--turf);display:inline-block;border-radius:2px;}
  #cfbrt-widget .section-note{font-size:12.5px;color:var(--chalk-dim);font-family:'IBM Plex Mono',monospace;}
  #cfbrt-widget .period-select{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;letter-spacing:.04em;
    background:var(--surface-2);
    color:var(--chalk);
    border:1px solid var(--line);
    border-radius:6px;
    padding:8px 12px;
    margin-bottom:14px;
    cursor:pointer;
    max-width:100%;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  #cfbrt-widget .period-select:hover{border-color:var(--turf-bright);}
  #cfbrt-widget .filters{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;
    background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:16px;
  }
  #cfbrt-widget .filters select, #cfbrt-widget .filters input{
    background:var(--surface-2);
    color:var(--chalk);
    border:1px solid var(--line);
    border-radius:6px;
    padding:8px 10px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  #cfbrt-widget .filters input{flex:1;min-width:160px;}
  #cfbrt-widget .reset-btn{
    background:transparent;border:1px solid var(--line);color:var(--chalk-dim);
    padding:8px 12px;border-radius:6px;font-size:12.5px;cursor:pointer;font-family:'Inter',sans-serif;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  #cfbrt-widget .reset-btn:hover{border-color:var(--gold);color:var(--gold);}
  #cfbrt-widget table{width:100%;min-width:560px;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:12.5px;}
  #cfbrt-widget thead th{
    text-align:left;padding:10px 12px;color:var(--chalk-dim);
    text-transform:uppercase;letter-spacing:.06em;font-size:10.5px;
    border-bottom:1px solid var(--line);cursor:pointer;user-select:none;
    position:sticky;top:0;background:var(--bg);
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  #cfbrt-widget thead th:hover{color:var(--gold);}
  #cfbrt-widget thead th.active{color:var(--gold);}
  #cfbrt-widget tbody td{padding:9px 12px;border-bottom:1px solid var(--line);color:var(--chalk);vertical-align:top;}
  #cfbrt-widget tbody tr:hover{background:var(--row-hover);}
  #cfbrt-widget .col-viewers{color:var(--gold);font-weight:600;white-space:nowrap;}
  #cfbrt-widget .col-network{color:var(--turf-bright);white-space:nowrap;}
  #cfbrt-widget .col-game{max-width:150px;white-space:normal;word-break:break-word;}
  #cfbrt-widget .table-scroll{max-height:560px;overflow-y:auto;overflow-x:auto;border:1px solid var(--line);border-radius:10px;-webkit-overflow-scrolling:touch;}
  #cfbrt-widget .table-scroll table{font-size:12.5px;}
  #cfbrt-widget footer{margin-top:56px;text-align:center;color:var(--chalk-dim);font-family:'IBM Plex Mono',monospace;font-size:11.5px;}
  #cfbrt-widget ::-webkit-scrollbar{width:8px;height:8px;}
  #cfbrt-widget ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  @media (max-width:600px){
  #cfbrt-widget .wrap{padding:0 14px;}
  #cfbrt-widget section{margin-top:28px;}
  #cfbrt-widget .section-head h2{font-size:17px;}
  #cfbrt-widget .period-select{font-size:11px;padding:8px 10px;width:100%;}
  #cfbrt-widget .filters{padding:12px;flex-direction:column;align-items:stretch;}
  #cfbrt-widget .filters select, #cfbrt-widget .filters input{font-size:16px;width:100%;padding:10px;}
  #cfbrt-widget .filters input{min-width:0;}
  #cfbrt-widget .reset-btn{width:100%;padding:10px;font-size:14px;}
  #cfbrt-widget .col-game{max-width:110px;font-size:11.5px;}
}
</style>

<div id="cfbrt-widget">

<div class="wrap">

  <section style="margin-top:32px;">
    <div class="section-head">
      <h2>All Broadcasts</h2>
      <button class="theme-switch" id="themeToggle" type="button" aria-label="Toggle dark mode">
        <span class="theme-switch-track">
          <span class="theme-switch-thumb" id="themeThumb"><span id="themeIcon">☾</span></span>
        </span>
      </button>
    </div>
    <select class="period-select" id="periodSelect"></select>
    <div class="filters">
      <select id="fNetwork"></select>
      <input id="fSearch" type="text" placeholder="Search team or game…">
      <button class="reset-btn" id="fReset">Reset</button>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th data-col="viewers">Viewers (M)</th>
            <th data-col="game">Game</th>
            <th data-col="dateTime">Date / Time</th>
            <th data-col="network">Network</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </section>

  <footer>Source: team-compiled Google Sheet (Nielsen, ESPN PR, FOX Sports PR, NBC Sports PR, CBS Sports, sportsmediawatch.com, and other press releases). Some early/late-week figures are same-day estimates.</footer>
</div>


</div>

const PHASE_ORDER = ["Regular Season","Conference Championship","Army-Navy","Bowl Game","CFP Playoff"];

let state = { phase:"", network:"", week:"", search:"", sortCol:"viewers", sortDir:"desc" };

function fmt(n){ return n.toFixed(3).replace(/0+$/,"").replace(/\.$/,"") ; }
function fmtViewers(n){
  // show up to 3 decimals, trim trailing zeros, keep at least 1 decimal
  let s = n.toFixed(3);
  s = s.replace(/0+$/,"");
  if(s.endsWith(".")) s += "0";
  return s;
}

function buildPeriodToggle(){
  const weekNums = Array.from(new Set(DATA.filter(r=>r.week).map(r=>r.week))).sort((a,b)=>a-b);
  const postseasonPhases = PHASE_ORDER.filter(p=>p!=="Regular Season" && DATA.some(r=>r.phase===p));

  const options = [];
  options.push({label:"All Games", phase:"", week:""});
  weekNums.forEach(w=>options.push({label:"Wk. "+w, phase:"Regular Season", week:String(w)}));
  postseasonPhases.forEach(p=>{
    const shortLabel = {
      "Conference Championship":"Conf. Championships",
      "Army-Navy":"Army-Navy",
      "Bowl Game":"Bowls",
      "CFP Playoff":"CFP"
    }[p] || p;
    options.push({label:shortLabel, phase:p, week:""});
  });

  const el = document.getElementById('periodSelect');
  el.innerHTML = options.map(o=>
    `<option value="${o.phase}|${o.week}">${o.label}</option>`
  ).join("");

  el.addEventListener('change', ()=>{
    const [phase, week] = el.value.split('|');
    state.phase = phase;
    state.week = week;
    renderTable();
  });
  syncPeriodToggle();
}

function syncPeriodToggle(){
  const el = document.getElementById('periodSelect');
  el.value = state.phase + '|' + state.week;
}

function buildFilters(){
  const nets = ["All Networks", ...Array.from(new Set(DATA.map(r=>r.network))).sort()];
  document.getElementById('fNetwork').innerHTML = nets.map(n=>`<option value="${n==='All Networks'?'':n}">${n}</option>`).join("");

  document.getElementById('fNetwork').addEventListener('change', e=>{state.network=e.target.value; renderTable();});
  document.getElementById('fSearch').addEventListener('input', e=>{state.search=e.target.value.toLowerCase(); renderTable();});
  document.getElementById('fReset').addEventListener('click', ()=>{
    state = { phase:"", network:"", week:"", search:"", sortCol:"viewers", sortDir:"desc" };
    document.getElementById('fNetwork').value="";
    document.getElementById('fSearch').value="";
    syncPeriodToggle();
    renderTable();
  });

  document.querySelectorAll('thead th').forEach(th=>{
    th.addEventListener('click', ()=>{
      const col = th.dataset.col;
      if(state.sortCol===col){ state.sortDir = state.sortDir==='desc'?'asc':'desc'; }
      else { state.sortCol = col; state.sortDir = col==='viewers'?'desc':'asc'; }
      renderTable();
    });
  });
}

function shortenDateTime(str, hideRoundLabels){
  let s = str.replace(/\u00a0/g, ' ');
  s = s.replace(/^(Mon|Tue|Tues|Wed|Thu|Thurs|Fri|Sat|Sun)[a-zA-Z]*\.?,?\s+/, '');
  s = s.replace(/Week\s+\d+\s*[\u2013\u2011-]\s*/i, '');
  if(hideRoundLabels){
    s = s.replace(/Quarterfinal\s*[\u2013\u2011-]\s*/i, '');
    s = s.replace(/Semifinal\s*[\u2013\u2011-]\s*/i, '');
    s = s.replace(/First Round\s*[\u2013\u2011-]\s*/i, '');
    s = s.replace(/National Championship\s*[\u2013\u2011-]\s*/i, '');
  } else {
    s = s.replace(/Quarterfinal\s*[\u2013\u2011-]\s*/i, 'QF: ');
    s = s.replace(/Semifinal\s*[\u2013\u2011-]\s*/i, 'SF: ');
    s = s.replace(/First Round\s*[\u2013\u2011-]\s*/i, 'R1: ');
    s = s.replace(/National Championship\s*[\u2013\u2011-]\s*/i, 'NC: ');
  }
  s = s.replace(/p\.m\./gi, 'pm');
  s = s.replace(/a\.m\./gi, 'am');
  s = s.replace(/\b(Jan|Feb|Mar|Apr|Aug|Sept|Sep|Oct|Nov|Dec)\./g, '$1');
  s = s.replace(/\bNoon\b/i, '12pm');
  s = s.replace(/\u2013/g, '-');
  s = s.replace(/\s+/g, ' ').trim();
  return s;
}

function renderTable(){
  let rows = DATA.filter(r=>{
    if(state.phase && r.phase!==state.phase) return false;
    if(state.network && r.network!==state.network) return false;
    if(state.week && String(r.week)!==state.week) return false;
    if(state.search && !(r.game.toLowerCase().includes(state.search) || r.network.toLowerCase().includes(state.search) || r.dateTime.toLowerCase().includes(state.search))) return false;
    return true;
  });

  rows = rows.slice().sort((a,b)=>{
    let av=a[state.sortCol], bv=b[state.sortCol];
    if(typeof av==='string'){ av=av.toLowerCase(); bv=bv.toLowerCase(); }
    if(av<bv) return state.sortDir==='asc'?-1:1;
    if(av>bv) return state.sortDir==='asc'?1:-1;
    return 0;
  });

  document.getElementById('tableBody').innerHTML = rows.map(r=>`
    <tr>
      <td class="col-viewers">${fmtViewers(r.viewers)}</td>
      <td class="col-game">${r.game}</td>
      <td>${shortenDateTime(r.dateTime, state.phase !== "CFP Playoff")}</td>
      <td class="col-network">${r.network}</td>
    </tr>
  `).join("");

  document.querySelectorAll('thead th').forEach(th=>{
    th.classList.toggle('active', th.dataset.col===state.sortCol);
  });
}

function buildThemeToggle(){
  const btn = document.getElementById('themeToggle');
  const icon = document.getElementById('themeIcon');
  function applyTheme(mode){
    document.getElementById('cfbrt-widget').dataset.theme = mode;
    icon.textContent = mode === 'dark' ? '☀' : '☾';
    btn.setAttribute('aria-pressed', mode === 'dark' ? 'true' : 'false');
  }
  applyTheme('light');
  btn.addEventListener('click', ()=>{
    const next = document.getElementById('cfbrt-widget').dataset.theme === 'dark' ? 'light' : 'dark';
    applyTheme(next);
  });
}

function safe(fn, label){
  try { fn(); } catch(err){ console.error('Tracker init step failed:', label, err); }
}

safe(buildThemeToggle, 'themeToggle');
safe(buildPeriodToggle, 'periodToggle');
safe(buildFilters, 'filters');
safe(renderTable, 'table');


})();
</script>
